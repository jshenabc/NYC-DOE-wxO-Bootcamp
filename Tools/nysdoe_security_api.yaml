openapi: 3.0.3
info:
  title: NYSDOE Security API
  version: 1.0.0
  description: >
    Remotely lock and unlock doors across NYSDOE school district buildings,
    and send emergency SMS alerts to school principals.
    Supports per-building and district-wide operations with full notification
    logging on every action.
    Building identifiers use the 4-character NYCDOE buildingCode (e.g. "K140")
    and district identifiers use the 2-digit districtCode (e.g. "07").

servers:
  - url: https://nysdoe-security-api.2c0tjpub3zot.us-south.codeengine.appdomain.cloud

paths:
  /districts/{districtCode}/doors/bulk:
    post:
      operationId: bulkSetDoors
      summary: Lock or unlock ALL buildings in a district
      description: >
        Bulk locks or unlocks every building in the district and fires one notification per building.
        Use this for district-wide emergency lockdowns or all-clear unlocks.
      tags: [Doors]
      parameters:
        - name: districtCode
          in: path
          required: true
          schema:
            type: string
          description: 2-digit NYCDOE district code (e.g. "07")
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DoorActionRequest'
      responses:
        "200":
          description: All buildings in district updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkDoorResult'
        "404":
          description: No buildings found in district

  /districts/{districtCode}/alert-principals:
    post:
      operationId: bulkAlertPrincipals
      summary: Alert ALL school principals in a district
      description: >
        Sends an emergency alert to every school principal in a district.
        Only targets buildings of type school with a principal phone on record.
        Buildings without a phone are skipped and reported separately.
      tags: [Alerts]
      parameters:
        - name: districtCode
          in: path
          required: true
          schema:
            type: string
          description: 2-digit NYCDOE district code (e.g. "07")
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrincipalAlertRequest'
      responses:
        "200":
          description: Alerts sent to all reachable principals
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkAlertResult'
        "404":
          description: No schools found in district

components:
  schemas:
    DoorState:
      type: string
      enum: [locked, unlocked]

    AlertSeverity:
      type: string
      enum: [low, medium, high, critical]

    DoorActionRequest:
      type: object
      required: [action, triggered_by]
      properties:
        action:       { $ref: '#/components/schemas/DoorState' }
        triggered_by: { type: string, example: "Emergency Response Agent" }
        reason:       { type: string, example: "Tornado watch — District 07" }
        severity:     { $ref: '#/components/schemas/AlertSeverity' }

    PrincipalAlertRequest:
      type: object
      required: [message, triggered_by]
      properties:
        message:      { type: string, example: "TORNADO WATCH: Initiate shelter-in-place immediately." }
        triggered_by: { type: string, example: "Emergency Response Agent" }
        severity:     { $ref: '#/components/schemas/AlertSeverity' }

    BulkDoorResult:
      type: object
      properties:
        status:          { type: string }
        districtCode:    { type: string, example: "07" }
        action:          { $ref: '#/components/schemas/DoorState' }
        buildings_count: { type: integer }
        buildings:
          type: array
          items:
            type: object
            properties:
              buildingCode:    { type: string }
              buildingName:    { type: string }
              type:            { type: string, enum: [school, office] }
              door_state:      { type: string }
              notification_id: { type: string }
        timestamp: { type: string, format: date-time }

    BulkAlertResult:
      type: object
      properties:
        status:        { type: string }
        districtCode:  { type: string }
        alerted_count: { type: integer }
        skipped_count: { type: integer }
        alerted:
          type: array
          items:
            type: object
            properties:
              buildingCode:    { type: string }
              buildingName:    { type: string }
              type:            { type: string, enum: [school, office] }
              principal_phone: { type: string }
              notification_id: { type: string }
        skipped:
          type: array
          items:
            type: object
            properties:
              buildingCode: { type: string }
              type:         { type: string, enum: [school, office] }
              reason:       { type: string }
        timestamp: { type: string, format: date-time }

    NotificationOut:
      type: object
      properties:
        notification_id: { type: string }
        buildingCode:    { type: string }
        buildingName:    { type: string }
        event:           { type: string }
        detail:          { type: string }
        triggered_by:    { type: string }
        severity:        { type: string }
        timestamp:       { type: string, format: date-time }
